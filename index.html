<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socioboost - Maintenance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 50px 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .icon { font-size: 70px; margin-bottom: 20px; }
        h1 { font-size: 28px; margin-bottom: 10px; color: #333; }
        .badge {
            background: #ff9800;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 20px;
        }
        p { color: #666; line-height: 1.6; margin-bottom: 20px; }
        .apology {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            color: #667eea;
        }
        .btn {
            display: inline-block;
            background: #25d366;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            margin-top: 15px;
        }
        .btn i { margin-right: 8px; }
        .note { font-size: 12px; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔧</div>
        <div class="badge">UNDER MAINTENANCE</div>
        <h1>We'll Be Back Soon!</h1>
        <p>Our website is currently undergoing maintenance to serve you better.</p>
        <div class="apology">
             We sincerely apologize for the inconvenience. We'll be back shortly!
        </div>
        <a href="https://wa.me/233500836470" class="btn" target="_blank">
            <i class="fab fa-whatsapp"></i> Contact Support
        </a>
        <div class="note">🚀 Socioboost - Growing Your Social Media Presence</div>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</body>
</html>
