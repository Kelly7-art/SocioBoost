<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socioboost - X (Twitter) Services</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Socioboost</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#services">Services</a>
            <a href="index.html#pricing">Pricing</a>
            <a href="index.html#contact">Contact</a>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 30px;">🚀 Boost Your X (Twitter) Account</h2>
            
            <form id="boostForm">
                <div class="form-group">
                    <label for="boostType">What would you like to boost?</label>
                    <select id="boostType" required>
                        <option value="">Select option</option>
                        <option value="followers">Followers</option>
                        <option value="likes">Likes</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <select id="quantity" required>
                        <option value="">Select quantity</option>
                        <option value="1000">1,000</option>
                        <option value="5000">5,000</option>
                        <option value="10000">10,000</option>
                    </select>
                </div>

                <div id="priceDisplay" class="current-price">
                    Select options to see price
                </div>

                <div class="form-group">
                    <label for="email">Your Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Your Phone Number</label>
                    <input type="tel" id="phone" placeholder="e.g., 0XXXXXXXXX" required>
                </div>

                <div class="form-group">
                    <label for="link">X (Twitter) Profile/Post Link</label>
                    <input type="url" id="link" placeholder="https://twitter.com/username" required>
                </div>

                <button type="submit" class="btn">Proceed to Payment (¢<span id="submitAmount">0</span>)</button>
            </form>
        </div>
    </div>

    <!-- Popup for notification -->
    <div class="popup-overlay" id="popupOverlay"></div>
    <div class="popup" id="popup">
        <i class="fas fa-check-circle" style="font-size: 48px; color: #4CAF50; margin-bottom: 20px;"></i>
        <h3 style="margin-bottom: 15px;">Order Received!</h3>
        <p style="margin-bottom: 20px; color: #666;">Your request has been sent. Redirecting to payment...</p>
    </div>

    <!-- Floating WhatsApp Button -->
    <a href="https://wa.me/233552183826?text=Hello%20Socioboost%2C%20I%20need%20help%20with%20X%20(Twitter)%20boost" 
       class="whatsapp-float" 
       target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        // Pricing configuration for X (Twitter)
        const prices = {
            followers: { 1000: 200, 5000: 1000, 10000: 2000 },
            likes: { 1000: 75, 5000: 375, 10000: 750 }
        };

        const boostType = document.getElementById('boostType');
        const quantity = document.getElementById('quantity');
        const priceDisplay = document.getElementById('priceDisplay');
        const submitAmount = document.getElementById('submitAmount');

        function updatePrice() {
            const type = boostType.value;
            const qty = quantity.value;
            
            if (type && qty && prices[type] && prices[type][qty]) {
                const amount = prices[type][qty];
                priceDisplay.textContent = `Total: ¢${amount}`;
                submitAmount.textContent = amount;
            } else {
                priceDisplay.textContent = 'Select options to see price';
                submitAmount.textContent = '0';
            }
        }

        boostType.addEventListener('change', updatePrice);
        quantity.addEventListener('change', updatePrice);

        function showPopup() {
            document.getElementById('popup').classList.add('active');
            document.getElementById('popupOverlay').classList.add('active');
            
            setTimeout(() => {
                document.getElementById('popup').classList.remove('active');
                document.getElementById('popupOverlay').classList.remove('active');
            }, 2000);
        }

        // Handle form submission
        document.getElementById('boostForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const type = boostType.value;
            const qty = quantity.value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const link = document.getElementById('link').value;
            const amount = prices[type][qty];

            const formattedQuantity = parseInt(qty).toLocaleString();

            const message = `
🔔 <b>X (TWITTER) FOLLOWERS REQUESTED</b> 🔔

📊 <b>Service Type:</b> ${type.toUpperCase()}
📈 <b>Amount:</b> ${formattedQuantity}
💰 <b>Total Price:</b> ¢${amount}
📧 <b>Customer Email:</b> ${email}
📞 <b>Customer Number:</b> ${phone}
🔗 <b>Profile Link:</b> ${link}
🕐 <b>Time:</b> ${new Date().toLocaleString()}

<code>⏳ Waiting for payment confirmation...</code>
            `;

            const botToken = '8200243949:AAEmhTB7eQtooSGOaSfTITiWpC38nveFS9U';
            const chatId = '6353331252';
            
            showPopup();

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });

                const orderDetails = {
                    platform: 'X (Twitter)',
                    type: type,
                    quantity: qty,
                    email: email,
                    phone: phone,
                    link: link,
                    amount: `¢${amount}`
                };
                
                localStorage.setItem('orderDetails', JSON.stringify(orderDetails));
                
                setTimeout(() => {
                    window.location.href = 'xfollowerspay.html';
                }, 2000);
                
            } catch (error) {
                console.error('Error:', error);
                const orderDetails = {
                    platform: 'X (Twitter)',
                    type: type,
                    quantity: qty,
                    email: email,
                    phone: phone,
                    link: link,
                    amount: `¢${amount}`
                };
                
                localStorage.setItem('orderDetails', JSON.stringify(orderDetails));
                
                setTimeout(() => {
                    window.location.href = 'xfollowerspay.html';
                }, 2000);
            }
        });
    </script>
</body>
</html>
